name: c2a_app
description: "C2A - Human Detection in Disaster Scenarios using UAV Imagery"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.0.7
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  http: ^1.2.0
  shared_preferences: ^2.2.3
  geolocator: ^11.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
